<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neossance™ Hemisqualane｜科友實業股份有限公司</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif; background: #fbf8e0; color: #333; }
    header { background: #ffffff; padding: 16px 28px; display: flex; align-items: center; border-bottom: 3px solid #01ab35; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    header img.logo { height: 64px; object-fit: contain; }
    .hero { background: linear-gradient(135deg, #54714e 0%, #01ab35 100%); padding: 36px 24px 44px; text-align: center; }
    .hero .badge { display: inline-block; background: rgba(255,255,255,0.2); color: #fff; font-size: 0.75rem; padding: 4px 16px; border-radius: 20px; letter-spacing: 2px; margin-bottom: 14px; }
    .hero h1 { color: #fff; font-size: 2.2rem; font-weight: 700; letter-spacing: 1px; margin-bottom: 8px; }
    .hero .sub { color: rgba(255,255,255,0.85); font-size: 1rem; }
    .content { max-width: 720px; margin: 0 auto; padding: 28px 18px 40px; }
    .section-label { display: flex; align-items: center; gap: 8px; font-size: 0.78rem; color: #54714e; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
    .section-label::after { content: ''; flex: 1; height: 1px; background: #96d000; opacity: 0.5; }
    .card { background: #fff; border-radius: 16px; overflow: hidden; margin-bottom: 24px; box-shadow: 0 2px 14px rgba(0,0,0,0.07); }
    .card-header { background: #54714e; color: #fff; padding: 12px 20px; font-size: 0.9rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .card-header .dot { width: 8px; height: 8px; border-radius: 50%; background: #96d000; display: inline-block; }
    .card img.material-img { width: 100%; display: block; }
    .notice { background: #fff8e8; border-left: 4px solid #feb500; border-radius: 0 10px 10px 0; padding: 12px 16px; font-size: 0.8rem; color: #666; margin-bottom: 24px; line-height: 1.6; }
    footer { background: #54714e; color: rgba(255,255,255,0.75); text-align: center; padding: 22px 16px; font-size: 0.8rem; line-height: 1.8; }
    footer strong { color: #fff; font-size: 0.9rem; }
    footer .divider { margin: 0 8px; opacity: 0.4; }
    @media (max-width: 480px) { .hero h1 { font-size: 1.6rem; } header img.logo { height: 48px; } }
  </style>
